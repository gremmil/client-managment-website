<div
  *ngIf="viewData$ | async as data; else loading"
  class="p-4 md:p-6 max-w-7xl mx-auto flex flex-col space-y-4 md:space-y-6 flex-1 min-h-0 overflow-hidden h-full"
>
  <!-- Action Bar responsive -->
  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
    <div class="flex-1 min-w-0">
      <h2 class="text-lg sm:text-xl font-bold text-t-text">Resumen de Clientes</h2>
      <p class="text-xs sm:text-sm text-t-text-muted">
        Visualiza los indicadores clave y gestiona los registros.
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <button
        (click)="clearAllFilters()"
        class="hidden md:inline-flex items-center justify-center space-x-2 px-3 py-2 text-sm font-medium text-t-danger bg-t-danger-light border border-t-danger rounded-lg hover:bg-t-danger hover:text-white transition-colors flex-1"
      >
        <ng-icon name="heroXMark" size="16px"></ng-icon>
        <span>Limpiar filtros</span>
      </button>

      <button
        (click)="toggleMetrics()"
        class="inline-flex items-center space-x-1.5 px-2.5 py-1.5 sm:px-3 sm:py-2 text-xs sm:text-sm font-medium text-t-text-secondary bg-t-surface border border-t-border rounded-lg hover:bg-t-surface-alt transition-colors flex-1 justify-center"
      >
        <ng-icon
          [name]="showMetrics ? 'heroEyeSlash' : 'heroEye'"
          size="14px"
          class="sm:size-4"
        ></ng-icon>
        <span>{{ showMetrics ? 'Ocultar métricas' : 'Mostrar métricas' }}</span>
      </button>

      <button
        (click)="openCreateModal()"
        class="inline-flex items-center space-x-1.5 bg-t-primary hover:bg-t-primary-hover text-white text-xs sm:text-sm font-medium px-2.5 py-1.5 sm:px-3 sm:py-2 rounded-lg shadow-sm transition-colors flex-1 justify-center"
      >
        <ng-icon name="heroPlus" size="14px" class="sm:size-4"></ng-icon>
        <span>Nuevo Cliente</span>
      </button>
    </div>
  </div>

  <app-metrics-cards
    *ngIf="showMetrics"
    [metrics]="data.metrics"
  ></app-metrics-cards>

  <div
    class="flex-1 flex flex-col bg-t-surface rounded-2xl border border-t-border shadow-sm overflow-hidden min-h-0"
  >
    <app-clients-table
      class="flex-1 min-h-0"
      [clients]="data.clients"
      [total]="data.total"
      [pageIndex]="(pageIndex$ | async) ?? 0"
      [pageSize]="(pageSize$ | async) ?? 10"
      [ageRange]="(ageRange$ | async) ?? { min: 18, max: 100 }"
      (sortChange)="handleSort($event)"
      (pageChange)="handlePageChange($event)"
      (filterChange)="handleFilterChange($event)"
      (clearAllFilters)="handleClearAllFilters()"
    ></app-clients-table>
  </div>
</div>

<ng-template #loading>
  <div
    class="flex flex-col items-center justify-center p-24 text-t-text-muted space-y-4"
  >
    <ng-icon name="heroArrowPath" class="animate-spin" size="32px"></ng-icon>
    <span class="text-sm font-medium">Cargando datos...</span>
  </div>
</ng-template>
