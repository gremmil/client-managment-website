<!-- HEADER -->
<h2
  mat-dialog-title
  class="text-xl font-bold text-t-text flex items-center gap-2 m-0 pb-2"
>
  <mat-icon class="text-t-primary" fontIcon="filter_alt">filter_alt</mat-icon>
  <span>Filtros</span>
</h2>

<!-- CONTENT -->
<mat-dialog-content class="!overflow-y-auto">
  <form class="flex flex-col gap-4 py-2">
    <!-- Campo Nombre -->
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="name" name="name" />
    </mat-form-field>

    <!-- Campo Apellido -->
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Apellido</mat-label>
      <input matInput [(ngModel)]="lastname" name="lastname" />
    </mat-form-field>

    <!-- Rango de Edad -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-t-text-secondary"
        >Rango de edad</label
      >
      <div class="grid grid-cols-2 gap-3">
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Mínimo</mat-label>
          <input matInput type="number" [(ngModel)]="ageMin" name="ageMin" />
        </mat-form-field>
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Máximo</mat-label>
          <input matInput type="number" [(ngModel)]="ageMax" name="ageMax" />
        </mat-form-field>
      </div>
    </div>

    <!-- Fecha de Nacimiento -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-t-text-secondary"
        >Fecha de nacimiento</label
      >

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Desde</mat-label>
        <input
          matInput
          [matDatepicker]="startPicker"
          [(ngModel)]="birthDateStart"
          name="birthDateStart"
        />
        <mat-datepicker-toggle
          matSuffix
          [for]="startPicker"
        ></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Hasta</mat-label>
        <input
          matInput
          [matDatepicker]="endPicker"
          [(ngModel)]="birthDateEnd"
          name="birthDateEnd"
        />
        <mat-datepicker-toggle
          matSuffix
          [for]="endPicker"
        ></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<!-- FOOTER / ACTIONS -->
<mat-dialog-actions
  align="end"
  class="flex items-center gap-2 pt-2 filter-actions"
>
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="applyFilters()">
    Aplicar filtros
  </button>
</mat-dialog-actions>
