<div
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 flex-shrink-0"
>
  <mat-card
    class="bg-t-surface border border-t-border transition-shadow duration-200 hover:shadow-md"
  >
    <mat-card-content class="!flex items-center gap-4 p-4 sm:p-6">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-t-primary-light text-t-primary"
      >
        <mat-icon class="text-[28px] w-7 h-7">group</mat-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p
          class="text-xs font-medium text-t-text-muted uppercase tracking-wide mb-1"
        >
          Clientes Encontrados
        </p>
        <p class="text-3xl font-bold text-t-text leading-tight">
          {{ metrics?.total ?? 0 }}
        </p>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card
    class="bg-t-surface border border-t-border transition-shadow duration-200 hover:shadow-md"
  >
    <mat-card-content class="!flex items-center gap-4 p-4 sm:p-6">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-t-success-light text-t-success"
      >
        <mat-icon class="text-[28px] w-7 h-7">analytics</mat-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p
          class="text-xs font-medium text-t-text-muted uppercase tracking-wide mb-1"
        >
          Edad Promedio
        </p>
        <p class="text-3xl font-bold text-t-text leading-tight">
          {{ metrics?.averageAge | number: "1.1-2" }}
          <span class="text-sm font-normal text-t-text-muted ml-1">años</span>
        </p>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card
    class="bg-t-surface border border-t-border transition-shadow duration-200 hover:shadow-md"
  >
    <mat-card-content class="!flex items-center gap-4 p-4 sm:p-6">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-xl shrink-0 bg-t-warning-light text-t-warning"
      >
        <mat-icon class="text-[28px] w-7 h-7">adjust</mat-icon>
      </div>
      <div class="flex-1 min-w-0">
        <p
          class="text-xs font-medium text-t-text-muted uppercase tracking-wide mb-1"
        >
          Desv. Estándar Edad
        </p>
        <p class="text-3xl font-bold text-t-text leading-tight">
          ± {{ metrics?.standardDeviation | number: "1.1-2" }}
        </p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
