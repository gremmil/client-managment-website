<aside
  [ngClass]="{ 'sidebar-open': isMobileMenuOpen, 'sidebar-closed': !isMobileMenuOpen }"
  class="bg-t-surface border-r border-t-border w-64 flex-shrink-0 flex flex-col justify-between h-full overflow-y-auto sidebar-mobile-overlay"
>
  <div class="flex flex-col">
    <nav class="mt-6 px-4 space-y-1">
      <a
        routerLink="/dashboard/clients"
        routerLinkActive="bg-t-primary-light text-t-primary-text font-medium"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="onCloseMobile()"
        class="flex items-center space-x-3 px-4 py-3 rounded-lg text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
      >
        <ng-icon name="heroUsers" size="20px"></ng-icon>
        <span>Clientes</span>
      </a>
    </nav>

    <div class="mt-4 px-4 space-y-1">
      <div class="relative">
        <button
          (click)="toggleThemeDropdown()"
          class="w-full flex items-center justify-between px-4 py-3 rounded-lg text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
        >
          <div class="flex items-center space-x-3">
            <ng-icon [name]="getThemeIcon()" size="20px"></ng-icon>
            <span>Tema</span>
          </div>
          <ng-icon name="heroChevronDown" size="16px" [class.rotate-180]="showThemeDropdown" class="transition-transform"></ng-icon>
        </button>
        <div
          *ngIf="showThemeDropdown"
          class="absolute left-0 right-0 top-full mt-1 bg-t-surface border border-t-border rounded-lg shadow-lg z-50 overflow-hidden"
        >
          <button
            (click)="onThemeChange('light')"
            class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
            [class.bg-t-primary-light]="themeService.currentTheme === 'light'"
            [class.text-t-primary-text]="themeService.currentTheme === 'light'"
          >
            <ng-icon name="heroSun" size="16px"></ng-icon>
            <span>Claro</span>
          </button>
          <button
            (click)="onThemeChange('dark')"
            class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
            [class.bg-t-primary-light]="themeService.currentTheme === 'dark'"
            [class.text-t-primary-text]="themeService.currentTheme === 'dark'"
          >
            <ng-icon name="heroMoon" size="16px"></ng-icon>
            <span>Oscuro</span>
          </button>
          <button
            (click)="onThemeChange('midnight')"
            class="w-full flex items-center space-x-3 px-4 py-2.5 text-sm text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
            [class.bg-t-primary-light]="themeService.currentTheme === 'midnight'"
            [class.text-t-primary-text]="themeService.currentTheme === 'midnight'"
          >
            <ng-icon name="heroStar" size="16px"></ng-icon>
            <span>Medianoche</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="p-4 border-t border-t-border">
    <button
      (click)="onLogout()"
      class="w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-lg text-t-danger hover:bg-t-danger-light font-medium transition-colors cursor-pointer"
    >
      <ng-icon name="heroArrowRightOnRectangle" size="20px"></ng-icon>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</aside>
