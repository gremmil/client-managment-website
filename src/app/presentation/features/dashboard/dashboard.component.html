<div class="h-screen bg-t-bg flex flex-col">
  <header
    class="bg-t-surface border-b border-t-border flex items-center justify-between px-4 py-3 md:px-8 shadow-sm flex-shrink-0"
  >
    <div class="flex items-center space-x-4">
      <button
        (click)="toggleSidenav()"
        class="p-2 rounded-lg text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
      >
        <mat-icon fontIcon="menu"></mat-icon>
      </button>
      <div class="flex items-center space-x-2">
        <mat-icon
          fontIcon="group"
          class="text-t-primary !text-[28px] !w-7 !h-7"
        ></mat-icon>
        <span class="text-xl font-bold text-t-text tracking-tight"
          >ClientPortal</span
        >
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <span class="hidden lg:inline text-sm text-t-text-muted font-medium"
        >Administrador</span
      >
    </div>
  </header>

  <mat-sidenav-container class="flex-1">
    <mat-sidenav
      #sidenav
      [mode]="sidenavMode"
      class="border-r border-t-border"
      style="width: 256px"
    >
      <app-sidebar
        (logout)="logout()"
        (closeMobileMenu)="sidenav.close()"
      ></app-sidebar>
    </mat-sidenav>
    <mat-sidenav-content>
      <main class="flex flex-col min-w-0 h-full overflow-hidden p-4 md:p-8">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
