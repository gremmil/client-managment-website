<div class="h-screen bg-t-bg flex flex-col">
  <header
    class="bg-t-surface border-b border-t-border flex items-center justify-between px-4 py-3 md:px-8 shadow-sm flex-shrink-0"
  >
    <div class="flex items-center space-x-4">
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden p-2 rounded-lg text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
      >
        <ng-icon
          [name]="isMobileMenuOpen ? 'heroXMark' : 'heroBars3'"
          size="24px"
        ></ng-icon>
      </button>
      <div class="flex items-center space-x-2">
        <ng-icon name="heroUserGroup" size="28px" class="text-t-primary"></ng-icon>
        <span class="text-xl font-bold text-t-text tracking-tight">ClientPortal</span>
      </div>
      <button
        (click)="toggleSidebar()"
        class="hidden md:block p-2 rounded-lg text-t-text-secondary hover:bg-t-surface-alt hover:text-t-text transition-colors"
      >
        <ng-icon name="heroBars3" size="20px"></ng-icon>
      </button>
    </div>
    <div class="flex items-center space-x-4">
      <span class="hidden lg:inline text-sm text-t-text-muted font-medium">Administrador</span>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden relative">
    <app-sidebar
      *ngIf="!isSidebarHidden"
      [isMobileMenuOpen]="isMobileMenuOpen"
      (logout)="logout()"
      (closeMobileMenu)="isMobileMenuOpen = false"
    ></app-sidebar>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <div class="flex-1 overflow-hidden p-4 md:p-8 min-h-0">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
